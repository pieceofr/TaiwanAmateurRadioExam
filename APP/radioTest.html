<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣業餘無線電人員資格測試考題 ANKI 學習法</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Microsoft JhengHei', sans-serif; }
        .card { max-width: 950px; margin: auto; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #quiz-canvas { background: #fff; border-bottom: 2px solid #eee; display: block; margin: auto; border-radius: 16px 16px 0 0; }
        .hidden { display: none !important; }
        .btn-anki { width: 100%; padding: 15px; font-weight: bold; border-radius: 10px; }
        .info-box { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #dee2e6; }
        .highlight { color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-home" class="card p-5">
        <h2 class="text-center mb-4">台灣業餘無線電 ANKI 學習系統</h2>
        <div class="mb-4">
            <label class="form-label fw-bold">1. 載入題庫 (例如: 無線電通訊方法題庫.csv)</label>
            <input type="file" id="file-q" accept=".csv" class="form-control form-control-lg">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">2. 可不選: 載入權重檔 (例如: weight_無線電通訊方法題庫.csv)</label>
            <input type="file" id="file-w" accept=".csv" class="form-control form-control-lg">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">3. 選擇測驗題數</label>
            <select id="select-test-num" class="form-select form-select-lg">
                <option value="35" selected>35 題</option>
                <option value="40">40 題</option>
                <option value="50">50 題</option>
            </select>
        </div>
        <button class="btn btn-primary btn-lg w-100" onclick="handleFileProcess()">載入檔案</button>
    </div>

    <div id="step-info" class="card p-5 hidden">
        <h3 class="text-center mb-4">測驗資訊確認</h3>
        <div class="info-box mb-4">
            <div class="row g-3">
                <div class="col-7 fw-bold">1. 題庫總題數：</div>
                <div class="col-5 highlight" id="info-pool-num">0</div>
                <div class="col-7 fw-bold">2. 權重狀態：</div>
                <div class="col-5" id="info-w-status">--</div>
                <div class="col-7 fw-bold">3. 學習進度統計：</div>
                <div class="col-5">
                    已熟練 (Weight=0)：<span class="text-success fw-bold" id="info-learned-num">0</span><br>
                    待學習 (Weight>0)：<span class="text-danger fw-bold" id="info-unlearned-num">0</span>
                </div>
                <div class="col-7 fw-bold">4. 本次測驗題數：</div>
                <div class="col-5 highlight fs-5" id="info-test-num">0</div>
            </div>
        </div>
        <button class="btn btn-success btn-lg w-100 py-3 fs-4" onclick="initQuizSession()">開始測試</button>
        <button class="btn btn-link w-100 mt-2 text-secondary" onclick="showStep('step-home')">重新上傳檔案</button>
    </div>

    <div id="step-quiz" class="card hidden">
        <canvas id="quiz-canvas" width="950" height="400"></canvas>
        <div class="card-body p-4">
            <div id="view-ask">
                <div class="row g-3 align-items-center">
                    <div class="col-md-9">
                        <select id="user-ans" class="form-select form-select-lg">
                            <option value="" disabled selected>請選擇答案 (1-4)...</option>
                            <option value="1">(1)</option>
                            <option value="2">(2)</option>
                            <option value="3">(3)</option>
                            <option value="4">(4)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-dark btn-lg w-100" onclick="verifyChoice()">提交答案</button>
                    </div>
                </div>
            </div>
            
            <div id="quiz-fb" class="mt-3 p-3 rounded hidden border text-center fw-bold"></div>
            <div id="view-anki" class="hidden mt-4 text-center">
                <div class="row g-2">
                    <div class="col-3"><button class="btn btn-danger btn-anki" onclick="ankiSubmit('HELL')">HELL</button></div>
                    <div class="col-3"><button class="btn btn-warning btn-anki" onclick="ankiSubmit('HARD')">HARD</button></div>
                    <div class="col-3"><button class="btn btn-success btn-anki" onclick="ankiSubmit('GOOD')">GOOD</button></div>
                    <div class="col-3"><button class="btn btn-info text-white btn-anki" onclick="ankiSubmit('EASY')">EASY</button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="step-result" class="card p-5 text-center hidden">
        <h2 class="mb-3">測驗結果</h2>
        <div class="display-1 fw-bold mb-2" id="res-score">0 / 0</div>
        <div id="res-status" class="h2 mb-4"></div>
        <div class="row justify-content-center g-3">
            <div class="col-md-5">
                <button class="btn btn-primary btn-lg w-100" onclick="finalAction('RESTART')">儲存並繼續 (RESTART)</button>
            </div>
            <div class="col-md-5">
                <button class="btn btn-danger btn-lg w-100" onclick="finalAction('RESET')">清空進度重練 (RESET)</button>
            </div>
        </div>
    </div>
</div>

<script>
    let rawDB = [], masterWeights = [], sessionQueue = [], curPtr = 0, rightSum = 0;
    let totalPoolNum = 0, testNum = 35;
    const canvas = document.getElementById('quiz-canvas'), ctx = canvas.getContext('2d');

    async function handleFileProcess() {
        const qFile = document.getElementById('file-q').files[0];
        const wFile = document.getElementById('file-w').files[0];
        if(!qFile) return alert("請選取題庫檔案！");

        try {
            const qText = await qFile.text();
            parseCSV(qText);
            totalPoolNum = rawDB.length;
            masterWeights = new Array(totalPoolNum).fill(1.0);
            let wStatus = "全新開始";

            if (wFile) {
                const wText = await wFile.text();
                const wLines = wText.trim().split(/\r?\n/).slice(1);
                if (wLines.length === totalPoolNum) {
                    wLines.forEach((line, i) => {
                        const parts = line.split(',');
                        masterWeights[i] = parts.length >= 2 ? parseFloat(parts[1]) : 1.0;
                    });
                    wStatus = "載入歷史權重";
                }
            }
            document.getElementById('info-w-status').innerText = wStatus;
            updateInfoPage();
            showStep('step-info');
        } catch (e) {
            alert("分析失敗，請檢查檔案內容。");
        }
    }

    function updateInfoPage() {
        const selectedVal = parseInt(document.getElementById('select-test-num').value);
        const validWeightNum = masterWeights.filter(w => w > 0).length;
        testNum = Math.min(selectedVal, totalPoolNum, (validWeightNum === 0 ? totalPoolNum : validWeightNum));

        document.getElementById('info-pool-num').innerText = totalPoolNum;
        document.getElementById('info-learned-num').innerText = totalPoolNum - validWeightNum;
        document.getElementById('info-unlearned-num').innerText = validWeightNum;
        document.getElementById('info-test-num').innerText = testNum;
    }

    function parseCSV(text) {
        rawDB = [];
        const lines = text.split(/\r?\n/);
        const regex = /(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g;
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const parts = (line.match(regex) || []).map(v => v.replace(/^"|"$/g, '').trim());
            if (parts.length >= 7) {
                rawDB.push({ ans: parseInt(parts[0].replace(/[()]/g, '')), text: parts[2], opts: [parts[3], parts[4], parts[5], parts[6]], id: parts[1] });
            }
        }
    }

    function initQuizSession() {
        const validIndices = masterWeights.map((w, i) => w > 0 ? i : -1).filter(i => i !== -1);
        if (validIndices.length === 0 && totalPoolNum > 0) {
            alert("題庫已全部熟練！系統將重置權重讓您重新複習。");
            masterWeights.fill(1.0);
            updateInfoPage();
        }

        sessionQueue = []; curPtr = 0; rightSum = 0;
        let pool = [...masterWeights];
        for (let i = 0; i < testNum; i++) {
            const picked = pickIndex(pool);
            if (picked === -1) break;
            sessionQueue.push(picked);
            pool[picked] = 0;
        }

        if (sessionQueue.length > 0 ){ 
            showStep('step-quiz'); 
            renderQuestion(); 
        } else {
            alert("無法生成題目，請確認題庫。");
        }
    }

    function pickIndex(wArr) {
        const sum = wArr.reduce((a, b) => a + b, 0);
        if (sum <= 0) return -1;
        let r = Math.random() * sum;
        for (let i = 0; i < wArr.length; i++) {
            if (r < wArr[i]) return i;
            r -= wArr[i];
        }
        return -1;
    }

    function renderQuestion() {
        const data = rawDB[sessionQueue[curPtr]];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#2c3e50";
        ctx.font = "bold 22px 'Microsoft JhengHei'";
        let nextY = wrapText(ctx, `${curPtr + 1}. ${data.text}`, 50, 60, 850, 35);
        ctx.font = "20px 'Microsoft JhengHei'";
        ctx.fillStyle = "#555";
        data.opts.forEach((o, i) => ctx.fillText(o, 60, nextY + 50 + (i * 40)));
        
        document.getElementById('view-ask').classList.remove('hidden');
        document.getElementById('quiz-fb').classList.add('hidden');
        document.getElementById('view-anki').classList.add('hidden');
        document.getElementById('user-ans').value = "";
    }

    function verifyChoice() {
        const sel = document.getElementById('user-ans').value;
        if (!sel) return alert("請選擇答案！");
        const data = rawDB[sessionQueue[curPtr]], isRight = parseInt(sel) === data.ans;
        if (isRight) rightSum++;
        
        const fb = document.getElementById('quiz-fb');
        fb.classList.remove('hidden');
        fb.className = `mt-3 p-3 rounded alert ${isRight ? 'alert-success' : 'alert-danger'}`;
        fb.innerText = `${isRight ? '答對了！' : '答錯了！'} 正確答案是 (${data.ans})`;
        
        document.getElementById('view-ask').classList.add('hidden');
        document.getElementById('view-anki').classList.remove('hidden');
    }

    function ankiSubmit(tag) {
        const idx = sessionQueue[curPtr];
        // 修正邏輯：僅調整權重，不額外插入隊列末尾
        if (tag === 'EASY') masterWeights[idx] = 0;
        else if (tag === 'GOOD') masterWeights[idx] *= 0.5;
        else if (tag === 'HARD') masterWeights[idx] *= 2.0;
        else if (tag === 'HELL') masterWeights[idx] *= 4.0; 
        
        curPtr++;
        if (curPtr < sessionQueue.length) renderQuestion(); else showFinal();
    }

    function showFinal() {
        showStep('step-result');
        document.getElementById('res-score').innerText = `${rightSum} / ${testNum}`;
        const pct = (rightSum / testNum) * 100;
        document.getElementById('res-status').innerText = pct >= 80 ? "及格 (PASS)" : "不及格 (FAIL)";
        document.getElementById('res-status').className = `h2 mb-4 fw-bold ${pct >= 80 ? 'text-success' : 'text-danger'}`;
    }

    function finalAction(mode) {
        if (mode === 'RESET') {
            if(confirm("確定要重置所有權重進度嗎？")) {
                masterWeights.fill(1.0);
                updateInfoPage();
                showStep('step-info');
            }
        } else {
            exportWeights(); 
            updateInfoPage(); 
            showStep('step-info'); 
        }
    }

    function exportWeights() {
        let csv = "ID,Weight\n";
        rawDB.forEach((q, i) => csv += `${q.id},${masterWeights[i]}\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = 'weight.csv'; a.click();
    }

    function wrapText(c, t, x, y, m, l) {
        let words = t.split(''), line = '', curY = y;
        for (let i = 0; i < words.length; i++) {
            let test = line + words[i];
            if (c.measureText(test).width > m) { c.fillText(line, x, curY); line = words[i]; curY += l; }
            else line = test;
        }
        c.fillText(line, x, curY); return curY;
    }

    function showStep(id) {
        ['step-home', 'step-info', 'step-quiz', 'step-result'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
